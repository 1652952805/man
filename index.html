<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎀 南梁测试系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      text-align: center;
      color: #764ba2;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .subtitle {
      text-align: center;
      color: #888;
      margin-bottom: 30px;
      font-size: 0.9em;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
      animation: fadeIn 0.5s ease;
    }

    /* 性别选择页面 */
    .gender-buttons {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 30px;
    }

    .gender-btn {
      padding: 20px 40px;
      font-size: 1.2em;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: bold;
    }

    .gender-btn.male {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .gender-btn.male:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .gender-btn.female {
      background: #f0f0f0;
      color: #666;
    }

    .gender-btn.female:hover {
      background: #ffe0e0;
      color: #d63384;
    }

    /* 拒绝页面 */
    .reject-box {
      text-align: center;
      padding: 20px;
    }

    .reject-icon {
      font-size: 4em;
      margin-bottom: 20px;
    }

    .reject-text {
      font-size: 1.3em;
      color: #d63384;
      margin-bottom: 20px;
    }

    .back-btn {
      background: #764ba2;
      color: white;
      border: none;
      padding: 12px 30px;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1em;
      transition: all 0.3s;
    }

    .back-btn:hover {
      background: #667eea;
      transform: scale(1.05);
    }

    /* 测试题目 */
    .question-box {
      margin-bottom: 25px;
    }

    .question-number {
      color: #764ba2;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.1em;
      color: #333;
      margin-bottom: 15px;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      padding: 15px 20px;
      background: #f8f9fa;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      text-align: left;
      font-size: 1em;
    }

    .option:hover {
      border-color: #667eea;
      background: #f0f4ff;
      transform: translateX(5px);
    }

    .option.selected {
      border-color: #764ba2;
      background: #e8e0ff;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e9ecef;
      border-radius: 4px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 4px;
      transition: width 0.5s ease;
      width: 0%;
    }

    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
    }

    .nav-btn {
      padding: 12px 30px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1em;
      transition: all 0.3s;
    }

    .nav-btn.prev {
      background: #f0f0f0;
      color: #666;
    }

    .nav-btn.next {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    .nav-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .nav-btn:not(:disabled):hover {
      transform: scale(1.05);
    }

    /* 结果页面 - 不同等级样式 */
    .result-box {
      text-align: center;
      padding: 20px;
    }

    .result-icon {
      font-size: 5em;
      margin-bottom: 20px;
      animation: bounce 1s infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .result-title {
      font-size: 2em;
      margin-bottom: 15px;
    }

    .result-level {
      display: inline-block;
      padding: 8px 25px;
      border-radius: 20px;
      font-size: 1em;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .result-desc {
      font-size: 1.1em;
      color: #555;
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .analogy-box {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
      text-align: center;
    }

    .analogy-box h3 {
      color: #764ba2;
      margin-bottom: 10px;
    }

    .analogy-person {
      font-size: 1.5em;
      font-weight: bold;
      margin: 10px 0;
    }

    .analogy-desc {
      color: #666;
      line-height: 1.6;
      font-size: 0.95em;
    }

    .result-detail {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
    }

    .result-detail h3 {
      color: #764ba2;
      margin-bottom: 10px;
    }

    .result-detail p {
      color: #666;
      line-height: 1.6;
    }

    .score-display {
      font-size: 3em;
      font-weight: bold;
      margin: 15px 0;
    }

    .restart-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      padding: 15px 40px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1.1em;
      margin-top: 20px;
      transition: all 0.3s;
    }

    .restart-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    }

    .meme-text {
      font-style: italic;
      color: #888;
      margin-top: 15px;
      font-size: 0.9em;
    }

    /* 等级颜色 */
    .level-0 {
      color: #28a745;
    }

    .level-0-bg {
      background: #d4edda;
      color: #155724;
    }

    .level-1 {
      color: #ffc107;
    }

    .level-1-bg {
      background: #fff3cd;
      color: #856404;
    }

    .level-2 {
      color: #fd7e14;
    }

    .level-2-bg {
      background: #ffe5cc;
      color: #804000;
    }

    .level-3 {
      color: #dc3545;
    }

    .level-3-bg {
      background: #f8d7da;
      color: #721c24;
    }

    /* 特效 */
    .sparkle {
      position: fixed;
      pointer-events: none;
      animation: sparkle 1s forwards;
      z-index: 9999;
    }

    @keyframes sparkle {
      0% {
        transform: scale(0) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: scale(1.5) rotate(180deg);
        opacity: 0;
      }
    }

    .confetti {
      position: fixed;
      pointer-events: none;
      animation: confetti-fall 3s forwards;
      z-index: 9999;
    }

    @keyframes confetti-fall {
      0% {
        transform: translateY(-100px) rotate(0deg);
        opacity: 1;
      }

      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0;
      }
    }
  </style>
</head>

    let answers = [];
    let selectedGender = '';

    function selectGender(gender) {

      if (gender === 'female') {
        showScreen('screen-reject');
      } else {
        showScreen('screen-quiz');
        loadQuestion();
      }
    }

    function goBack() {
      showScreen('screen-gender');
    }

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    function loadQuestion() {
      const q = questions[currentQuestion];
      const container = document.getElementById('question-container');

      container.innerHTML = `
                <div class="question-box">
                    <div class="question-number">问题 ${currentQuestion + 1} / ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">
                        ${q.options.map((opt, idx) => `
                            <button class="option ${answers[currentQuestion] === idx ? 'selected' : ''}" 
                                    onclick="selectOption(${idx})">
                                ${opt.text}
                            </button>
                        `).join('')}
                    </div>
                </div>
            `;

      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progress').style.width = progress + '%';

      document.getElementById('prevBtn').disabled = currentQuestion === 0;
      document.getElementById('nextBtn').disabled = answers[currentQuestion] === undefined;
      document.getElementById('nextBtn').textContent =
        currentQuestion === questions.length - 1 ? '查看结果' : '下一题';
    }

    function selectOption(index) {
      answers[currentQuestion] = index;
      loadQuestion();
    }

    function nextQuestion() {
      if (currentQuestion < questions.length - 1) {

        loadQuestion();
      } else {
        showResult();

      if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
      }
    }

    function calculateScore() {
      let totalScore = 0;
      let maxPossible = questions.length * 3;

      for (let i = 0; i < answers.length; i++) {
        if (answers[i] !== undefined) {
          totalScore += questions[i].options[answers[i]].score;
        }
      }

      // 计算百分比，确定等级
      const percentage = totalScore / maxPossible;
      let level;
      if (percentage <= 0.25) {
        level = 0;
      } else if (percentage <= 0.5) {
        level = 1;
      } else if (percentage <= 0.75) {
        level = 2;
      } else {
        level = 3;
      }

      return { totalScore, maxPossible, percentage, level };
    }

    function showResult() {
      const result = calculateScore();
      const levelData = resultLevels[result.level];

      showScreen('screen-result');

      // 设置图标
      document.getElementById('result-icon').textContent = levelData.icon;

      // 设置标题
      const titleEl = document.getElementById('result-title');
      titleEl.textContent = levelData.title;
      titleEl.className = 'result-title ' + levelData.levelClass;

      // 设置等级标签
      const levelEl = document.getElementById('result-level');
      levelEl.textContent = levelData.levelText;
      levelEl.className = 'result-level ' + levelData.levelBgClass;

      // 设置分数
      const scorePercent = Math.round(result.percentage * 100);
      document.getElementById('score-display').innerHTML =
        `<span class="${levelData.levelClass}">${scorePercent}%</span>`;

      // 设置描述
      document.getElementById('result-desc').textContent = levelData.desc;

      // 设置类比人物
      document.getElementById('analogy-person').textContent = levelData.person;
      document.getElementById('analogy-person').className = 'analogy-person ' + levelData.levelClass;
      document.getElementById('analogy-desc').textContent = levelData.personDesc;

      // 设置详细分析
      document.getElementById('result-analysis').textContent = levelData.analysis;

      // 设置梗
      document.getElementById('meme-text').textContent = levelData.meme;

      // 特效
      if (result.level >= 2) {
        createSparkles();
      }
      if (result.level === 3) {
        createConfetti();
      }
    }

    function createSparkles() {
      const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe'];
      for (let i = 0; i < 15; i++) {
        setTimeout(() => {
          const sparkle = document.createElement('div');
          sparkle.className = 'sparkle';
          sparkle.style.left = Math.random() * window.innerWidth + 'px';
          sparkle.style.top = Math.random() * window.innerHeight + 'px';
          sparkle.style.width = '15px';
          sparkle.style.height = '15px';
          sparkle.style.background = colors[Math.floor(Math.random() * colors.length)];
          sparkle.style.borderRadius = '50%';
          sparkle.style.position = 'fixed';
          document.body.appendChild(sparkle);
          setTimeout(() => sparkle.remove(), 1000);
        }, i * 150);
      }
    }

    function createConfetti() {
      const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff'];
      for (let i = 0; i < 50; i++) {
        setTimeout(() => {
          const confetti = document.createElement('div');
          confetti.className = 'confetti';
          confetti.style.left = Math.random() * window.innerWidth + 'px';
          confetti.style.top = '-10px';
          confetti.style.width = (Math.random() * 10 + 5) + 'px';
          confetti.style.height = (Math.random() * 10 + 5) + 'px';
          confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
          confetti.style.position = 'fixed';
          confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
          document.body.appendChild(confetti);
          setTimeout(() => confetti.remove(), 3000);
        }, i * 50);
      }
    }

    function restart() {
      currentQuestion = 0;
      answers = [];
      selectedGender = '';
      showScreen('screen-gender');
    }

    // 键盘支持
    document.addEventListener('keydown', (e) => {
      if (document.getElementById('screen-quiz').classList.contains('active')) {
        if (e.key === 'ArrowRight' || e.key === 'Enter') {
          const nextBtn = document.getElementById('nextBtn');
          if (!nextBtn.disabled) nextQuestion();
        } else if (e.key === 'ArrowLeft') {
          prevQuestion();
        }
      }
    });
  </script>
</body>
